<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f0f4f8;
        --surface: #ffffff;
        --text: #1a2332;
        --text-muted: #5c6b7f;
        --accent: #0d9488;
        --accent-soft: rgba(13, 148, 136, 0.12);
        --accent-strong: #0f766e;
        --border: #e2e8f0;
        --radius: 14px;
        --shadow: 0 8px 32px rgba(26, 35, 50, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "DM Sans", system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(160deg, #e8f4f2 0%, var(--bg) 45%, #e4ecf5 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem clamp(1rem, 4vw, 3rem);
      }

      .card {
        width: min(720px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(1.5rem, 4vw, 2.25rem);
      }

      .icon {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        display: grid;
        place-items: center;
        margin: 0 auto 1rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        text-align: center;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 auto;
        text-align: center;
        max-width: 44ch;
        color: var(--text-muted);
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .actions {
        margin-top: 1.5rem;
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--border);
        background: #fafbfc;
        color: var(--text);
        padding: 0.75rem 1rem;
        border-radius: 12px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.15s;
      }

      .btn-primary {
        border: none;
        color: #fff;
        background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
        box-shadow: 0 8px 24px rgba(13, 148, 136, 0.28);
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary:hover {
        box-shadow: 0 12px 32px rgba(13, 148, 136, 0.34);
      }

      .btn:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 3px;
      }

      .meta {
        margin-top: 1.25rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-label="Thank you">
      <div class="icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M20 6 9 17l-5-5" />
        </svg>
      </div>
      <h1>Thank you for your response</h1>
      <p>Your survey has been submitted successfully. We appreciate your time and feedback.</p>
      <div class="actions">
        <a class="btn btn-primary" href="index.html">Back to survey</a>
      </div>
      <div class="meta">You may now close this tab.</div>
    </main>
  </body>
</html>
